name: Mutation testing

# Thin caller of the shared mutation-testing reusable workflow; caller
# guide: leynos/shared-actions docs/mutation-mutmut-workflow.md.
on:
  schedule:
    - cron: "35 7 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: mutation-testing-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutation:
    permissions:
      contents: read
      id-token: write # OIDC workflow-source resolution
    uses: leynos/shared-actions/.github/workflows/mutation-mutmut.yml@2b09d10192627fd6e1034e7c12625dd266b45503
    with:
      # Flat package layout: mutable source lives under repo_local_tools/.
      paths: "repo_local_tools/"
      # No src/ prefix to strip when translating changed files to modules.
      module-prefix-strip: ""
      # Match pyproject's requires-python (>= 3.14); the workflow's
      # default UV_PYTHON of 3.13 would hard-error here.
      python-version: "3.14"
